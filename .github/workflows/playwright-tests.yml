name: Run Tests

on:
  schedule:
    - cron: "0 7 * * 1-5" # Every Monday to Friday at 07:00 UTC
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.group.name }} - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: api
            tag: "@api"
          - name: ui
            tag: "@ui"
          - name: webtables
            tag: "@webTables"
        browser: [chromium, firefox]
        exclude:
          - group:
              name: api
            browser: firefox

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run ${{ matrix.group.name }} Tests
        run: |
          npx playwright test \
            --grep '${{ matrix.group.tag }}' \
            --project=${{ matrix.browser }}

      - name: Upload Blob Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-${{ matrix.group.name }}-${{ matrix.browser }}
          path: blob-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-results-${{ matrix.group.name }}-${{ matrix.browser }}
          path: |
            playwright-report/
            test-results/
            reports/
          if-no-files-found: ignore
          retention-days: 30

  # Responsive testing job for UI tests
  responsive-tests:
    name: Responsive - ${{ matrix.viewport }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - viewport: mobile-chrome
            browser: chromium
          - viewport: tablet
            browser: webkit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run UI Tests - ${{ matrix.viewport }}
        run: |
          npx playwright test \
            --grep '@ui' \
            --project=${{ matrix.viewport }}

      - name: Upload Blob Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blob-report-responsive-${{ matrix.viewport }}
          path: blob-report/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload Responsive Test Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-results-responsive-${{ matrix.viewport }}
          path: |
            playwright-report/
            test-results/
            reports/
          if-no-files-found: ignore
          retention-days: 30

  # Merge and publish reports
  merge-reports:
    name: Merge Test Reports
    needs: [test, responsive-tests]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Download Blob Reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: all-blob-reports
          pattern: blob-report-*
          merge-multiple: true

      - name: Merge Reports
        run: npx playwright merge-reports --config=playwright.merge.config.js ./all-blob-reports

      - name: Upload Final Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: final-test-report
          path: reports/final/
          if-no-files-found: warn
          retention-days: 30
